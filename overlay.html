<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>OBS Overlay - Cyber Glitch</title>
  <!-- 科技风格字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Oxanium:wght@500;700&family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono&display=swap" rel="stylesheet">
  
  <!-- Style Loader -->
  <link rel="stylesheet" href="./src/styles/main.css">
  <link rel="stylesheet" href="laplace-cyberpunk.css">
</head>
<body>
  <div id="cyber-root" class="overlay">
    <!-- ========== 赛博故障模式原有元素 ========== -->
    <!-- 噪点和RGB层 -->
    <div class="noise-overlay"></div>
    <div class="rgb-shift"></div>

    <!-- 顶部不透明背景 -->
    <div class="top-section"></div>
    
    <!-- 底部不透明背景 -->
    <div class="bottom-section"></div>

    <div class="top-bar">
      <!-- 公告区域 - 固定宽度横向滚动 -->
      <div class="announcement-area">
        <div class="announcement-box" id="announcement">
          <span class="announcement-text" data-text="好说的，都来我家喝酒吧 没啥!">好说的，都来我家喝酒吧 没啥!</span>
          <div class="announcement-label">📢 NOTICE</div>
        </div>
      </div>

      <!-- 装饰条 -->
      <div class="top-left-deco">
        <div class="deco-bar"></div>
        <div class="deco-bar"></div>
        <div class="deco-bar"></div>
      </div>

      <!-- 时钟区域 - 在弹幕面板左侧 -->
      <div class="clock-area">
        <div class="time-display" id="clock">21:13</div>
        <div class="live-badge">LIVE</div>
      </div>
    </div>

    <!-- 游戏区域流光边框 -->
    <div class="game-frame">
      <svg class="beam-svg" viewBox="0 0 1940 843">
        <defs>
          <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:var(--primary-green);stop-opacity:1" />
            <stop offset="50%" style="stop-color:var(--primary-purple);stop-opacity:1" />
            <stop offset="100%" style="stop-color:var(--primary-green);stop-opacity:1" />
          </linearGradient>
        </defs>
        <!-- 静态背景线 -->
        <rect id="rect-bg" class="neon-path path-bg" x="10" y="10" width="1920" height="823" rx="30" ry="30" />
        <!-- 主流光线 -->
        <rect id="rect-main" class="neon-path path-main" x="10" y="10" width="1920" height="823" rx="30" ry="30" pathLength="100" />
        <!-- 故障闪烁线 -->
        <rect id="rect-glitch" class="neon-path path-glitch" x="10" y="10" width="1920" height="823" rx="30" ry="30" pathLength="100" />
      </svg>
    </div>

    <div class="minimal-datetime" id="minimalDateTime" aria-label="clock and date">
      <div class="minimal-datetime-inner">
        <div class="minimal-time" id="minimalClock">21:13:00</div>
        <div class="minimal-date" id="minimalDate">2026.04.04 SATURDAY</div>
      </div>
    </div>

    <!-- 弹幕区域 - 一半在游戏区内，一半在顶栏 -->
    <div class="danmaku-panel">
      <div class="danmaku-frame">
        <div class="danmaku-header">💬 DANMAKU</div>
        <div class="danmaku-corner tl"></div>
        <div class="danmaku-corner br"></div>
        <div class="danmaku-content" id="danmakuArea">
          <!-- 弹幕容器 -->
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <!-- 底部装饰效果容器 -->
      <div class="bottom-ambient-effect">
         <!-- 音频波形模拟 -->
         <div class="fake-visualizer">
           <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
           <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
           <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
           <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
           <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
         </div>
      </div>

      <div class="bottom-modules-container">
          <div class="game-info">
            <div class="game-label-wrapper">
               <div class="game-label">🎮 GAME</div>
               <div class="tech-deco-line"></div>
            </div>
            <div class="game-name" id="gameName"></div>
          </div>

          <!-- 音乐模块 -->
          <div class="music-module" id="musicModule">
            <div class="music-icon">🎵</div>
            <div class="music-info">
              <div class="music-label">🎧 NOW PLAYING</div>
              <div class="music-name-area" id="musicNameArea"></div>
            </div>
          </div>
      </div>
      
      <!-- 右侧装饰区 (Empty for Decor Only) -->
      <div class="bottom-right-decor">
          <div class="decor-line"></div>
          <div class="decor-text">SYS.NORMAL</div>
      </div>
    </div>

    <!-- 新增特效层 -->
    <div class="vignette-layer"></div>
    <div class="scan-line-layer"></div>
    <div class="hud-corners">
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>
    </div>

    <!-- 顶部装饰特效 -->
    <div class="top-deco-particles">
      <div class="top-particle"></div>
      <div class="top-particle"></div>
      <div class="top-particle"></div>
      <div class="top-particle"></div>
      <div class="top-particle"></div>
    </div>
    <div class="top-data-stream"></div>
    <div class="top-data-stream"></div>
    <div class="top-data-stream"></div>

    <!-- 底部装饰特效 -->
    <div class="bottom-deco-waves">
      <div class="wave-line"></div>
      <div class="wave-line"></div>
      <div class="wave-line"></div>
      <div class="wave-line"></div>
    </div>
    <div class="energy-bar"></div>
    <div class="indicator-lights">
      <div class="indicator"></div>
      <div class="indicator"></div>
      <div class="indicator"></div>
      <div class="indicator"></div>
    </div>

    <!-- 角落装饰 (Removed duplicates) -->
    <!-- Old .corner-deco divs removed as requested -->

    <!-- 个人信息组 (主页 + 版权) -->
    <div class="info-card-group">
      <div class="info-card homepage-badge">
        <span class="homepage-url">https://keita.cc</span>
      </div>
      <div class="info-card copyright-badge">
        <span class="copyright-text">Kurokawa Keita</span>
      </div>
    </div>

    <!-- 脉冲环 -->
    <div class="pulse-ring pulse-ring-1"></div>
    <div class="pulse-ring pulse-ring-2"></div>

    <!-- 顶部数据矩阵 -->
    <div class="matrix-rain">
      <div class="matrix-column">01100101</div>
      <div class="matrix-column">11010010</div>
      <div class="matrix-column">00111001</div>
      <div class="matrix-column">10101110</div>
      <div class="matrix-column">01001011</div>
    </div>

    <!-- 顶部状态指示器 -->
    <div class="status-indicators">
      <div class="status-item">
        <div class="status-dot online"></div>
        <span>ONLINE</span>
      </div>
      <div class="status-item">
        <div class="status-dot streaming"></div>
        <span>REC</span>
      </div>
      <div class="status-item">
        <div class="status-dot signal"></div>
        <span>SIGNAL</span>
      </div>
    </div>

    <!-- 顶部科技图标 -->
    <div class="tech-icons">
      <span class="tech-icon">⚡</span>
      <span class="tech-icon">◈</span>
      <span class="tech-icon">⬡</span>
    </div>

    <!-- 顶部十六进制显示 -->
    <div class="hex-display">0xF7A2B9C4</div>

    <!-- 顶部数据带 -->
    <div class="data-ribbon"></div>

    <!-- 底部音频可视化 -->
    <div class="audio-visualizer">
      <div class="audio-bar"></div>
      <div class="audio-bar"></div>
      <div class="audio-bar"></div>
      <div class="audio-bar"></div>
      <div class="audio-bar"></div>
      <div class="audio-bar"></div>
      <div class="audio-bar"></div>
      <div class="audio-bar"></div>
    </div>

    <!-- 底部电路板纹路 -->
    <div class="circuit-trace">
      <div class="circuit-path circuit-path-1"></div>
      <div class="circuit-path circuit-path-2"></div>
      <div class="circuit-path circuit-path-3"></div>
    </div>

    <!-- 底部进度条组 -->
    <div class="progress-bars">
      <div class="progress-item">
        <span class="progress-label">CPU</span>
        <div class="progress-track">
          <div class="progress-fill progress-fill-1"></div>
        </div>
      </div>
      <div class="progress-item">
        <span class="progress-label">GPU</span>
        <div class="progress-track">
          <div class="progress-fill progress-fill-2"></div>
        </div>
      </div>
      <div class="progress-item">
        <span class="progress-label">MEM</span>
        <div class="progress-track">
          <div class="progress-fill progress-fill-3"></div>
        </div>
      </div>
    </div>

    <!-- 底部技术环 -->
    <div class="tech-ring"></div>

    <!-- 底部数据带 -->
    <div class="bottom-ribbon"></div>

    <!-- 16:9 模式填充层 (JS控制显示) -->
    <div class="side-fillers" id="sideFillers">
        <div class="filler-panel filler-left">
            <div class="hud-circle"></div>
            <div class="scan-line-vertical"></div>
            <div class="bars-container">
                <div class="v-bar"></div>
                <div class="v-bar"></div>
                <div class="v-bar"></div>
            </div>
            <div class="filler-text">SYSTEM MONITOR</div>
        </div>
        <div class="filler-panel filler-right">
            <div class="hud-circle"></div>
            <div class="scan-line-vertical"></div>
             <div class="bars-container">
                <div class="v-bar"></div>
                <div class="v-bar"></div>
                <div class="v-bar"></div>
            </div>
            <div class="filler-text">NETWORK SECURE</div>
        </div>
    </div>

    <!-- 杂谈模式动态背景 -->
    <div class="chat-mode-bg"></div>

    <!-- 杂谈模式专用装饰容器 (Chat Left Effect) -->
    <div class="chat-left-deco">
        <!-- 垂直数据链路 -->
        <div class="chat-data-link">
            <div class="chat-data-packet"></div>
            <div class="chat-data-packet"></div>
        </div>
        <!-- 旋转罗盘 -->
        <div class="chat-compass"></div>
        <!-- 上浮粒子 -->
        <div class="chat-floater"></div>
        <div class="chat-floater"></div>
    </div>
  </div>

  <script type="module" src="./src/scripts/overlay.js"></script>
</body>
</html>
