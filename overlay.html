            <stop offset="0%" style="stop-color:var(--primary-green);stop-opacity:1" />

        </defs>

        <rect id="rect-main" class="neon-path path-main" x="10" y="10" width="1920" height="823" rx="30" ry="30" pathLength="100" />
        <!-- ������˸�� -->
        <rect id="rect-glitch" class="neon-path path-glitch" x="10" y="10" width="1920" height="823" rx="30" ry="30" pathLength="100" />

    <div class="minimal-datetime" id="minimalDateTime" aria-label="clock and date">

        <div class="minimal-actions-col">

          </div>

          <!-- ����ģ�� -->

    <div class="scan-line-layer"></div>
    <div class="hud-corners">
