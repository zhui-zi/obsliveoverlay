<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>OBS Overlay - macOS Floating</title>
  <link rel="stylesheet" href="./src/styles/main-macos.css">
</head>
<body>
  <div class="mac-wallpaper-ambient"></div>

  <div class="overlay">
    <!-- ===== Top Menu Bar ===== -->
    <header class="mac-menubar">
      <div class="menubar-left">
        <span class="apple-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" width="14" height="15" fill="currentColor">
            <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.3 47.1-.8 81.2-80.4 93.3-119.3-64.8-26.2-52.6-91.8-52.4-91.3zM240.5 86.8c18.5-24 23.4-56.5 15.6-86.8-24.1 2.3-56.1 19.3-73.6 42.4-15.5 21.1-23.7 51.5-17.3 80.7 27.5 2.5 56.5-12.8 75.3-36.3z"/>
          </svg>
        </span>
        <span class="menubar-item bold">OBS Studio</span>
        <span class="menubar-item">File</span>
        <span class="menubar-item">Edit</span>
        <span class="menubar-item">View</span>
        <span class="menubar-item">Window</span>
      </div>
      
      <div class="menubar-right">
        <!-- Live Status -->
        <div class="menubar-item live-indicator">
          <span class="live-dot"></span>
          <span class="live-text">LIVE</span>
        </div>
        
        <!-- Icons -->
        <span class="menubar-icon">
          <!-- Wifi SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
        </span>
        <span class="menubar-icon">
          <!-- Battery SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="3" ry="3"></rect><line x1="23" y1="13" x2="23" y2="11"></line><path d="M4 12h8" stroke-width="4" stroke="black"></path><path d="M4 12h8" stroke-width="2"></path></svg>
        </span>
        <span class="menubar-icon control-center-icon">
          <!-- Control Center SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
        </span>
        
        <!-- Clock -->
        <span id="clock" class="menubar-item time-display">21:13</span>
      </div>
    </header>

    <!-- ===== Game Frame (16:9 macOS Window) ===== -->
    <div class="game-frame mac-window">
      <div class="mac-window-titlebar">
        <div class="mac-window-controls">
          <span class="mac-dot red"></span>
          <span class="mac-dot yellow"></span>
          <span class="mac-dot green"></span>
        </div>
      </div>
      <div class="mac-window-content"></div>
    </div>

    <!-- ===== Frosted Glass Sidebar (Danmaku) ===== -->
    <aside class="mac-sidebar">
      <div class="mac-window-titlebar">
        <div class="mac-window-controls">
          <span class="mac-dot red"></span>
          <span class="mac-dot yellow"></span>
          <span class="mac-dot green"></span>
        </div>
      </div>
      <div class="danmaku-content" id="danmakuArea"></div>
    </aside>

    <!-- ===== Floating Large Rounded Glass Bottom Bar ===== -->
    <footer class="mac-bottom-bar">
      
      <!-- Announcement Section -->
      <div class="bar-section announcement-section">
        <div class="section-icon mac-icon-yellow">
          <!-- Feather: volume-2 -->
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </div>
        <div class="announcement-scroll">
          <span class="announcement-text" data-text="๏ฟฝ๏ฟฝำญ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝึฑ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ">๏ฟฝ๏ฟฝำญ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝึฑ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ</span>
        </div>
      </div>

      <!-- Game Name Section -->
      <div class="bar-section game-section">
          <div class="section-icon mac-icon-purple">
            <svg class="svg-game" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect><path d="M6 12h4"></path><path d="M8 10v4"></path><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line></svg>
            <svg class="svg-chat" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          </div>
          <div class="section-text" id="gameName">Cities Skylines 2</div>
        </div>

        <!-- Music Section -->
        <div class="bar-section music-section" id="musicModule">
          <div class="section-icon mac-icon-red">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
          </div>
          <div class="section-text" id="musicNameArea" style="min-width: 160px;"></div>
        </div>

        <!-- Info/Links Section -->
        <div class="bar-section links-section">
        <div class="info-row homepage-badge">
          <div class="info-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
          </div>
          <span class="info-text homepage-url">https://keita.cc</span>
        </div>
        <div class="info-row copyright-badge">
          <div class="info-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </div>
          <span class="info-text copyright-text">Kurokawa Keita</span>
        </div>
      </div>

    </footer>
    
    <!-- Empty placeholders to avoid overlay.js errors for 16:9 sideFillers -->
    <div id="sideFillers" style="display:none;">
      <div class="filler-panel left"></div>
      <div class="filler-panel right"></div>
    </div>
  </div>

  <script type="module" src="./src/scripts/overlay.js"></script>
</body>
</html>
